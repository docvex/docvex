<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>DocVex</title>
    <link rel="icon" type="image/x-icon" href="/app/favicon.ico" />
    <meta name="description" content="DocVex — project documentation workspace." />

    <div id="root"></div>
    <script type="module" src="/src/web.jsx"></script>
  </body>
