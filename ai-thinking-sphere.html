<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Thinking — Glowing Sphere</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #c9d2ee;
    /* Dark space backdrop. */
    background: radial-gradient(circle at 50% 45%, #0c1226, #060812 70%, #04050b);
  }
  .stage {
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1 / 1;
  }
  svg { width: 100%; height: 100%; display: block; }

  .panel {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 11px;
    padding: 16px 18px;
    border: 1px solid rgba(127, 140, 200, 0.18);
    border-radius: 14px;
    background: rgba(10, 16, 36, 0.55);
    backdrop-filter: blur(6px);
  }
  .row {
    display: grid;
    grid-template-columns: 78px 1fr 44px;
    align-items: center;
    gap: 12px;
  }
  .row label { font-size: 12.5px; letter-spacing: 0.02em; color: #9aa6cf; }
  .row output { font-size: 12px; text-align: right; color: #d7defb; font-variant-numeric: tabular-nums; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 4px;
    background: linear-gradient(90deg, rgb(29,158,117), rgb(127,119,221));
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 15px; height: 15px; border-radius: 50%;
    background: #eef2ff; border: 2px solid #7f77dd; cursor: pointer;
    box-shadow: 0 0 8px rgba(127,119,221,0.7);
  }
  input[type="range"]::-moz-range-thumb {
    width: 15px; height: 15px; border-radius: 50%;
    background: #eef2ff; border: 2px solid #7f77dd; cursor: pointer;
  }
  .buttons { display: flex; gap: 10px; margin-top: 4px; }
  button {
    flex: 1;
    padding: 9px 12px;
    font-size: 13px; font-weight: 600;
    color: #e7ecff;
    background: rgba(127, 119, 221, 0.16);
    border: 1px solid rgba(127, 119, 221, 0.4);
    border-radius: 9px;
    cursor: pointer;
    transition: background 120ms, border-color 120ms;
  }
  button:hover { background: rgba(127, 119, 221, 0.28); border-color: rgba(127, 119, 221, 0.7); }
</style>
</head>
<body>
  <div class="stage">
    <svg viewBox="0 0 360 360" aria-label="AI thinking indicator">
      <defs>
        <!-- Bluish atmospheric halo behind the sphere. -->
        <radialGradient id="halo" cx="50%" cy="46%" r="50%">
          <stop offset="0%"  stop-color="#3a5cff" stop-opacity="0.42" />
          <stop offset="45%" stop-color="#2a3bdd" stop-opacity="0.18" />
          <stop offset="100%" stop-color="#0c1226" stop-opacity="0" />
        </radialGradient>
        <!-- Neon bloom: blur merged UNDER the sharp source, twice over.
             Generous region so the glow never clips. -->
        <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      <!-- Atmospheric halo. -->
      <circle cx="180" cy="180" r="150" fill="url(#halo)" />

      <!-- Strands group: stroke-width set here so all strands inherit it. -->
      <g id="strands" filter="url(#glow)" fill="none" stroke-width="2.2"></g>

      <!-- Pole dots (drawn over the strands; they meet here). -->
      <circle id="poleN" cx="180" cy="48"  r="3.2" fill="#dfe6ff" filter="url(#glow)" />
      <circle id="poleS" cx="180" cy="312" r="3.2" fill="#dfe6ff" filter="url(#glow)" />
    </svg>
  </div>

  <div class="panel">
    <div class="row">
      <label for="glowEl">Glow</label>
      <input id="glowEl" type="range" min="0" max="9" step="0.1" value="3" />
      <output id="glowOut">3</output>
    </div>
    <div class="row">
      <label for="speedEl">Speed</label>
      <input id="speedEl" type="range" min="0" max="10" step="0.1" value="4" />
      <output id="speedOut">4</output>
    </div>
    <div class="row">
      <label for="weaveEl">Weave</label>
      <input id="weaveEl" type="range" min="0" max="150" step="1" value="85" />
      <output id="weaveOut">85%</output>
    </div>
    <div class="row">
      <label for="thickEl">Thickness</label>
      <input id="thickEl" type="range" min="0.5" max="6" step="0.1" value="2.2" />
      <output id="thickOut">2.2</output>
    </div>
    <div class="row">
      <label for="distortEl">Distort</label>
      <input id="distortEl" type="range" min="0" max="45" step="1" value="14" />
      <output id="distortOut">14</output>
    </div>
    <div class="buttons">
      <button id="shuffleBtn" type="button">Shuffle</button>
      <button id="playBtn" type="button">Pause</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  const SVG_NS = "http://www.w3.org/2000/svg";
  const cx = 180, cy = 180, R = 132;
  const N = 9;        // strands
  const SEGS = 34;    // line segments per strand
  const PI = Math.PI;

  // Teal -> purple ramp.
  const C0 = [29, 158, 117];
  const C1 = [127, 119, 221];

  const lerp = (a, b, t) => a + (b - a) * t;
  const rand = (a, b) => a + Math.random() * (b - a);
  function rampColor(t) {
    const r = Math.round(lerp(C0[0], C1[0], t));
    const g = Math.round(lerp(C0[1], C1[1], t));
    const b = Math.round(lerp(C0[2], C1[2], t));
    return "rgb(" + r + "," + g + "," + b + ")";
  }

  const group     = document.getElementById("strands");
  const blurNode  = document.querySelector("#glow feGaussianBlur");
  const glowEl    = document.getElementById("glowEl");
  const speedEl   = document.getElementById("speedEl");
  const weaveEl   = document.getElementById("weaveEl");
  const thickEl   = document.getElementById("thickEl");
  const distortEl = document.getElementById("distortEl");
  const glowOut    = document.getElementById("glowOut");
  const speedOut   = document.getElementById("speedOut");
  const weaveOut   = document.getElementById("weaveOut");
  const thickOut   = document.getElementById("thickOut");
  const distortOut = document.getElementById("distortOut");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const playBtn    = document.getElementById("playBtn");

  let strands = [];          // [{ segs:[<line>], params, pts:[[x,y,z]] }]
  let t = 0;                 // master rotation accumulator
  let dphase = 0;            // vertical-axis warp phase
  let playing = true;
  let rafId = null;

  // Build the line segments ONCE (per init/shuffle). Each strand gets its own
  // random params: base longitude, two wander terms, and an independent
  // rotation rate (random magnitude AND direction) so none rotate in lockstep.
  function buildStrands() {
    while (group.firstChild) group.removeChild(group.firstChild);
    strands = [];
    for (let i = 0; i < N; i++) {
      const color = rampColor(N === 1 ? 0 : i / (N - 1));
      const params = {
        base: rand(0, PI * 2),
        w1: rand(0.30, 0.90), w2: rand(0.15, 0.60),
        f1: rand(1, 3),       f2: rand(2, 5),
        p1: rand(0, PI * 2),  p2: rand(0, PI * 2),
        rot: (Math.random() < 0.5 ? -1 : 1) * rand(0.4, 1.2),
      };
      const g = document.createElementNS(SVG_NS, "g");
      g.setAttribute("stroke", color);     // colour per strand, width inherited
      const segs = [];
      for (let k = 0; k < SEGS; k++) {
        const ln = document.createElementNS(SVG_NS, "line");
        ln.setAttribute("stroke-linecap", "round");
        g.appendChild(ln);
        segs.push(ln);
      }
      group.appendChild(g);
      strands.push({ segs, params });
    }
  }

  // Recompute every strand's geometry + depth shading for this frame.
  function frame() {
    const weave = (+weaveEl.value) / 100;   // 0..1.5
    const speed = +speedEl.value;
    const D = +distortEl.value;

    t += speed * 0.009;
    dphase += 0.025;

    for (let s = 0; s < strands.length; s++) {
      const p = strands[s].params;
      const segEls = strands[s].segs;

      // Sample SEGS+1 points along the strand (u: 0 = north pole, 1 = south).
      const pts = new Array(SEGS + 1);
      for (let j = 0; j <= SEGS; j++) {
        const u = j / SEGS;
        const rad = R * Math.sin(PI * u);               // 0 at poles, max at equator
        const y = cy - R * Math.cos(PI * u);            // top -> bottom
        const lam = p.base
          + weave * (p.w1 * Math.sin(p.f1 * PI * u + p.p1) + p.w2 * Math.sin(p.f2 * PI * u + p.p2))
          + t * p.rot;                                  // longitude
        let x = cx + rad * Math.sin(lam);
        const z = Math.cos(lam);                        // +front / -back
        // Vertical-axis warp: 0 at poles (sin(PI*u) taper), wobbles the body.
        x += D * Math.sin((y - cy) * 0.045 + dphase) * Math.sin(PI * u);
        pts[j] = [x, y, z];
      }

      // Per frame, only update endpoints + depth opacity (segments already exist).
      for (let k = 0; k < SEGS; k++) {
        const a = pts[k], b = pts[k + 1];
        const ln = segEls[k];
        ln.setAttribute("x1", a[0].toFixed(2));
        ln.setAttribute("y1", a[1].toFixed(2));
        ln.setAttribute("x2", b[0].toFixed(2));
        ln.setAttribute("y2", b[1].toFixed(2));
        const z = (a[2] + b[2]) * 0.5;
        ln.setAttribute("opacity", (0.16 + 0.84 * ((z + 1) / 2)).toFixed(3));
      }
    }
  }

  function loop() {
    frame();
    if (playing) rafId = requestAnimationFrame(loop);
  }

  // ── Controls ──────────────────────────────────────────────────────────
  function applyGlow()      { blurNode.setAttribute("stdDeviation", glowEl.value); glowOut.textContent = (+glowEl.value).toFixed(1).replace(/\.0$/, ""); }
  function applyThickness() { group.setAttribute("stroke-width", thickEl.value);   thickOut.textContent = (+thickEl.value).toFixed(1); }
  function reflectSpeed()   { speedOut.textContent = (+speedEl.value).toFixed(1).replace(/\.0$/, ""); }
  function reflectWeave()   { weaveOut.textContent = weaveEl.value + "%"; }
  function reflectDistort() { distortOut.textContent = distortEl.value; }

  glowEl.addEventListener("input", applyGlow);
  thickEl.addEventListener("input", applyThickness);
  speedEl.addEventListener("input", reflectSpeed);
  weaveEl.addEventListener("input", reflectWeave);
  distortEl.addEventListener("input", reflectDistort);

  shuffleBtn.addEventListener("click", function () {
    buildStrands();
    applyThickness();
    frame();   // paint immediately so a paused sphere still updates
  });

  playBtn.addEventListener("click", function () {
    playing = !playing;
    playBtn.textContent = playing ? "Pause" : "Play";
    if (playing) loop();
    else if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  });

  // ── Init ──────────────────────────────────────────────────────────────
  buildStrands();
  applyGlow();
  applyThickness();
  reflectSpeed();
  reflectWeave();
  reflectDistort();
  loop();
})();
</script>
</body>
</html>
