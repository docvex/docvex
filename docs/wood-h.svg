<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B07A4F"/>
      <stop offset="45%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#5E3D24"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.55" numOctaves="3" seed="5" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.16  0 0 0 0 0.09  0 0 0 0 0.03  2.6 2.6 2.6 0 -1.1"/>
    </filter>
    <filter id="bands">
      <feTurbulence type="fractalNoise" baseFrequency="0.003 0.04" numOctaves="2" seed="11" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.10  0 0 0 0 0.05  0 0 0 0 0.02  1.9 1.9 1.9 0 -0.7"/>
    </filter>
    <filter id="light">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.55" numOctaves="3" seed="5" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.92  0 0 0 0 0.74  0 0 0 0 0.55  -2.6 -2.6 -2.6 0 1.6"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.28"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#base)"/>
  <rect width="800" height="800" filter="url(#grain)"/>
  <rect width="800" height="800" filter="url(#bands)"/>
  <rect width="800" height="800" filter="url(#light)" opacity="0.22"/>
  <rect width="800" height="800" fill="url(#vignette)"/>
</svg>
