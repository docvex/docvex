<!doctype html>
<html lang="en">
  <head><script>(function(){if(!window.location.pathname.startsWith("/app/")){window.location.replace("/");}})();</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>DocVex</title>
    <link rel="icon" type="image/x-icon" href="/app/favicon.ico" />
    <meta name="description" content="DocVex — project documentation workspace." />
    <!-- Theme color: matches the default Cream theme's --bg-page. Theme is
         per-user now (ThemeContext + localStorage), so this stays static
         at the default; dynamically syncing on theme switch is a follow-up. -->
    <meta name="theme-color" content="#F5F2EA" />
    <!-- Google Fonts: Inter (body) + Plus Jakarta Sans (headings). Same
         family list as index.html so the desktop and web builds render
         in the same typeface. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Web entry. The Electron build uses index.html → src/renderer.jsx
         with MemoryRouter; this file is the parallel web entry that mounts
         src/web.jsx with BrowserRouter under basename="/app". Both files
         render the same <App /> from src/App.jsx. -->
    <script type="module" crossorigin src="/app/assets/index.web-DscqOnQS.js"></script>
    <link rel="stylesheet" crossorigin href="/app/assets/index-C_pnguLm.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
