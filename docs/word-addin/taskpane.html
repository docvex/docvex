<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DocVex Legal AI</title>
  <!-- Office.js — must load before our script touches the Office namespace. -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <!-- Shown until Office.onReady resolves. -->
  <div id="boot" class="da-boot">
    <div class="da-spinner"></div>
    <p>Se încarcă DocVex Legal AI…</p>
  </div>

  <!-- Sign-in: the user authenticates with their DocVex credentials so the
       gated legal-assist function accepts the call. -->
  <section id="auth" class="da-screen" hidden>
    <header class="da-brand">
      <img src="https://docvex.ro/logo.png" alt="DocVex" class="da-logo" />
      <div>
        <h1>DocVex Legal AI</h1>
        <p class="da-sub">Asistent juridic pentru documentul tău Word</p>
      </div>
    </header>
    <form id="auth-form" class="da-auth-form">
      <label>Email
        <input id="auth-email" type="email" autocomplete="username" required placeholder="nume@docvex.ro" />
      </label>
      <label>Parolă
        <input id="auth-password" type="password" autocomplete="current-password" required placeholder="••••••••" />
      </label>
      <button id="auth-submit" type="submit" class="da-btn da-btn-primary">Conectează-te</button>
      <p id="auth-error" class="da-error" hidden></p>
      <p class="da-fineprint">Folosește același cont ca în aplicația DocVex.</p>
    </form>
  </section>

  <!-- Main workspace: feature buttons + a scrolling result + a chat box. -->
  <section id="app" class="da-screen" hidden>
    <header class="da-topbar">
      <div class="da-topbar-id">
        <img src="https://docvex.ro/logo.png" alt="" class="da-logo da-logo-sm" />
        <span class="da-title">Legal AI</span>
      </div>
      <button id="sign-out" class="da-link" type="button">Ieși</button>
    </header>

    <div class="da-actions">
      <button class="da-chip" data-task="summary" type="button">
        <span class="da-chip-glyph">📄</span> Rezumat
      </button>
      <button class="da-chip" data-task="risks" type="button">
        <span class="da-chip-glyph">⚠️</span> Riscuri &amp; clauze
      </button>
      <button class="da-chip" data-task="romanian" type="button">
        <span class="da-chip-glyph">⚖️</span> Verificare lege RO
      </button>
    </div>

    <div id="result" class="da-result" aria-live="polite">
      <div class="da-empty">
        <p><strong>Alege o acțiune</strong> de mai sus sau întreabă orice despre document.</p>
        <p class="da-hint">Selectează un fragment în Word pentru a întreba doar despre acea parte.</p>
      </div>
    </div>

    <div id="result-tools" class="da-result-tools" hidden>
      <button id="copy-btn" class="da-btn da-btn-ghost" type="button">Copiază</button>
      <button id="insert-btn" class="da-btn da-btn-ghost" type="button">Inserează în document</button>
    </div>

    <form id="ask-form" class="da-ask">
      <textarea id="ask-input" rows="1" placeholder="Întreabă orice despre acest document…"></textarea>
      <button id="ask-submit" class="da-btn da-btn-primary da-ask-send" type="submit" aria-label="Trimite">➤</button>
    </form>
  </section>

  <!-- supabase-js v2 (ESM) + our logic. type=module so the dynamic import resolves. -->
  <script src="config.js"></script>
  <script type="module" src="taskpane.js"></script>
</body>
</html>
