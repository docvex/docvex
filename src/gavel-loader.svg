<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loading">
  <title>Gavel slam loading indicator</title>
  <defs>
    <style>
      .gavel  { transform-box: view-box; transform-origin: 179.9px 140.7px; animation: slam 1.8s infinite; }
      .block  { transform-box: view-box; transform-origin: 57px 151px; animation: shake 1.8s infinite; }
      @keyframes slam {
        0%   { transform: rotate(14deg); animation-timing-function: ease-out; }
        14%  { transform: rotate(17deg); animation-timing-function: cubic-bezier(.55,0,.9,.35); }
        30%  { transform: rotate(-8.7deg); animation-timing-function: ease-out; }
        37%  { transform: rotate(-4.7deg); animation-timing-function: ease-in-out; }
        44%  { transform: rotate(-6.2deg);  animation-timing-function: ease-in-out; }
        62%  { transform: rotate(14deg); animation-timing-function: ease-out; }
        100% { transform: rotate(14deg); }
      }
      @keyframes shake { 0%,28%{transform:translateY(0)} 31%{transform:translateY(2.5px)} 38%{transform:translateY(0)} 100%{transform:translateY(0)} }
    </style>
  </defs>

  <g class="block" fill="#DCC9A3">
    <path d="M 22.0,146.9 v-5.4 a6.5,6.5 0 0 1 6.5,-6.5 h56.4 a6.5,6.5 0 0 1 6.5,6.5 v5.4 z"/>
    <rect x="17.8" y="151.0" width="77.7" height="13.6" rx="2.6"/>
  </g>

  <g class="gavel" fill="#DCC9A3">
    <g transform="translate(83.8 74.9) rotate(124.4)">
      <path d="M -10.4,-15.7 L -10.4,-115.0 A 10.5,10.5 0 0 1 10.5,-115.0 L 10.5,-15.7 Z"/>
      <rect x="-22.5" y="-21.6" width="44.9" height="43.2" rx="8.5"/>
      <rect x="-42.7" y="-26.8" width="16.1" height="53.6" rx="4.8"/>
      <rect x="26.6" y="-26.9" width="16.1" height="53.7" rx="4.8"/>
    </g>
  </g>

</svg>